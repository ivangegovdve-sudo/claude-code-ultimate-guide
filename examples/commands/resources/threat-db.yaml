    notes: "Part of the Claw Chain (see CVE-2026-44112); chained with CVE-2026-44115 to read sensitive files and expose credentials, then CVE-2026-44118 for owner-level control, then CVE-2026-44112 for backdoor persistence"

  - id: "CVE-2026-44115"
    component: "OpenClaw (shell allowlist validation)"
    severity: "high"
    cvss: 8.8
    description: "Incomplete list of disallowed inputs in the OpenClaw shell allowlist validation logic — attacker bypasses the allowlist to execute commands or access files that should be blocked; used as a stepping stone in the Claw Chain to expand the initial sandbox compromise"
    source: "Cyera Research / The Hacker News (2026-05)"
    fixed_in: "OpenClaw 2026.4.22"
    mitigation: "Update OpenClaw to >= 2026.4.22; see CVE-2026-44112 for chain context"
    cwe: "CWE-184"
    notes: "Part of the Claw Chain (see CVE-2026-44112); allowlist-based validation is inherently incomplete for shell inputs — update to 2026.4.22 replaces the blocklist/allowlist approach with a stricter execution model"

  - id: "CVE-2026-44118"
    component: "OpenClaw (privilege model)"
    severity: "critical"
    description: "Privilege escalation to owner-level control in OpenClaw — exploited in step 3 of the Claw Chain (after credential exposure via CVE-2026-44113 + CVE-2026-44115), allowing an attacker with initial plugin/prompt access to obtain full owner-level permissions on the OpenClaw instance; enables unrestricted configuration modification and backdoor installation in the final step (CVE-2026-44112)"
    source: "Cyera Research / Rescana / The Hacker News (2026-05)"
    fixed_in: "OpenClaw 2026.4.22"
    mitigation: "Update OpenClaw to >= 2026.4.22; apply principle of least privilege on OpenClaw instances; do not expose OpenClaw admin interfaces to untrusted networks"
    cwe: "CWE-269"
    notes: "Part of the Claw Chain (see CVE-2026-44112); the full exploit chain: compromised plugin/injection (initial) + CVE-2026-44113 + CVE-2026-44115 (credential theft) + CVE-2026-44118 (owner escalation) + CVE-2026-44112 (backdoor persistence)"

  # --- Claude Code CLI (TERMINAL env var injection, 3-CVE chain step 1) ---
  - id: "CVE-2026-35020"
    component: "Claude Code CLI and Claude Agent SDK"
    severity: "critical"
    description: "OS command injection via TERMINAL environment variable manipulation — Claude Code constructs a shell command using the TERMINAL variable with shell=true without sanitizing shell metacharacters; a local attacker or prompt-injection payload that controls the TERMINAL environment variable can execute arbitrary commands with Claude Code process privileges; first link in a 3-CVE chain: CVE-2026-35020 (TERMINAL injection) → CVE-2026-35021 (path injection) → CVE-2026-35022 (auth helper exfil)"
    source: "SentinelOne (2026-04-10); Phoenix Security (2026-04-03)"
    fixed_in: "Claude Code 2.1.92 / Claude Agent SDK 0.1.56"
    mitigation: "Update Claude Code to >= 2.1.92; do not allow untrusted environments to set the TERMINAL variable; run Claude Code in isolated environments with controlled env vars"
    cwe: "CWE-78"
    notes: "CVE-2026-35020 establishes code execution; attacker writes a malicious .claude/settings.json; CVE-2026-35022 then exfiltrates credentials on next auth cycle; all three fixed in Claude Code 2.1.92 and Claude Agent SDK 0.1.56"

  # --- Claude Code CLI (auth helper injection, 3-CVE chain step 3) ---
  - id: "CVE-2026-35022"
    component: "Claude Code CLI and Claude Agent SDK"
    severity: "critical"
    description: "OS command injection in authentication helper execution — helper config values (apiKeyHelper, awsAuthRefresh, awsCredentialExport, gcpAuthRefresh) are passed to shell with shell=true without input validation; attackers who influence these settings (e.g. via CVE-2026-35020 writing malicious .claude/settings.json) can inject shell metacharacters to execute arbitrary commands and exfiltrate credentials; confirmed via four escalating PoC variants including multi-line file exfiltration of Claude Code's own MEMORY.md conversation history over HTTP"
    source: "SentinelOne (2026-04-10); GitHub Advisory GHSA-479q-mw77-pmr5; Phoenix Security (2026-04-03)"
    fixed_in: "Claude Code 2.1.92 / Claude Agent SDK 0.1.56"
    mitigation: "Update Claude Code to >= 2.1.92; sanitize all auth helper config values before shell execution; never allow untrusted content to set auth helper parameters; rotate any credentials that may have been exposed"
    cwe: "CWE-78"
    notes: "GHSA-479q-mw77-pmr5; third link in the 3-CVE chain; validated exploitable on v2.1.91 as of 2026-04-03; Anthropic fixed all three CVEs together in 2.1.92"

  # --- Claude Code GitHub Action (permission bypass + CI/CD secret exfiltration) ---
  - id: "ADVISORY-CCACTION-2026-001"
    component: "claude-code-action (Anthropic GitHub Action for CI/CD)"
    severity: "high"
    cvss: 7.8
    description: "Indirect prompt injection via GitHub issue/PR content enabling permission bypass and CI/CD secret exfiltration — the action's checkWritePermissions function trusted any GitHub App actor whose token name ended in [bot], allowing any self-registered GitHub App to bypass write-permission checks and inject prompt payloads via issue bodies; injected prompts trick Claude Code into reading /proc/self/environ (exposing ANTHROPIC_API_KEY, OIDC tokens, and all workflow secrets) then writing contents to a GitHub issue comment; attacker who captures the OIDC token can exchange it for a GitHub App installation token with full repository write access; because Anthropic's own claude-code-action repository used the same vulnerable workflow, a successful attack could have propagated malicious code to every downstream consumer"
    source: "Flatt Security / RyotaK (2026-06-01); Microsoft Security Blog (2026-06-05); THN (2026-06-05)"
    fixed_in: "claude-code-action v1.0.94; Claude Code 2.1.128 (blocks /proc/self/environ access)"
    mitigation: "Update claude-code-action to >= v1.0.94; update Claude Code to >= 2.1.128; audit GitHub Actions workflows for indirect prompt injection via issue/PR bodies; restrict CI/CD secrets to necessary workflows only; use OIDC token scoping; prefer workflow_run trigger over pull_request_target"
    cwe: "CWE-20 CWE-77"
    notes: "GHSA-xq4m-mc3c-vvg3; CVSS v4.0 7.8; Anthropic paid $4,800 bounty to RyotaK (GMO Flatt Security); Cline's GitHub Actions was already exploited with the same pattern in February 2026 (Clinejection campaign); RyotaK has reported ~50 separate permission bypass paths in Claude Code; represents a class vulnerability affecting any AI coding agent action that ingests GitHub-controlled content (issue bodies, PR descriptions, comments)"

  # --- Cursor Agent Terminal Sandbox Escape (2-CVE chain) ---
  - id: "CVE-2026-50548"
    component: "Cursor (agent terminal sandbox)"
    severity: "critical"
    cvss: 9.8
    description: "Working-directory restriction bypass in Cursor's agent terminal sandbox lets an AI agent run terminal commands outside the intended workspace boundary"
    source: "GitHub Security Advisory GHSA-8pcm-8jpx-hv8r; BitNinja (2026-06-26)"
    fixed_in: "Cursor Desktop 3.0+"
    mitigation: "Update Cursor to >= 3.0; audit agent terminal sessions for out-of-workspace command execution"
    cwe: "CWE-22"
    notes: "Chained with CVE-2026-50549; both flaws disclosed together on 2026-06-26"
  - id: "CVE-2026-50549"
    component: "Cursor (agent terminal sandbox)"
    severity: "critical"
    cvss: 9.8
    description: "File-write escape triggered when path canonicalization fails and falls back insecurely, letting the agent write files outside the project boundary"
    source: "GitHub Security Advisory GHSA-8pcm-8jpx-hv8r; BitNinja (2026-06-26)"
    fixed_in: "Cursor Desktop 3.0+"
    mitigation: "Update Cursor to >= 3.0"
    cwe: "CWE-22"
    notes: "Chained with CVE-2026-50548"

  # --- FastMCP OpenAPIProvider ---
  - id: "CVE-2026-32871"
    component: "FastMCP (OpenAPIProvider)"
    severity: "high"
    description: "SSRF and path traversal via unencoded URL templates in OpenAPIProvider tool generation"
    source: "GitHub Advisory GHSA-vv7q-7jx5-f767"
