    date: "2026-05"
    platform: "OpenClaw"
    cves: ["CVE-2026-44112", "CVE-2026-44113", "CVE-2026-44115", "CVE-2026-44118"]
    technique: "Four chained vulnerabilities (TOCTOU sandbox write escape, TOCTOU sandbox file read, shell allowlist bypass, and owner-level privilege escalation) that can be combined to achieve stealthy full-host compromise starting from a single malicious plugin or prompt injection inside the OpenClaw sandbox. Chain: (1) initial foothold via malicious plugin or prompt injection; (2) CVE-2026-44113 + CVE-2026-44115 to read sensitive credentials and files outside the sandbox; (3) CVE-2026-44118 to escalate to owner-level control; (4) CVE-2026-44112 to write backdoors and establish persistence outside the sandbox."
