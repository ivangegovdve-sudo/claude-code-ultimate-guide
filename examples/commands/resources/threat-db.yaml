  - name: "Miasma Worm (TeamPCP)"
    source: "StepSecurity / The Hacker News / SafeDep (2026-06-05)"
    date: "2026-06-05"
    threat_actor: "TeamPCP"
    platform: "npm / GitHub"
    attack_type: "Self-propagating supply chain worm"
    phases:
      - phase: "Phase 1 (June 1-3, 2026)"
        target: "32 npm packages under @redhat-cloud-services namespace"
        method: "Typosquatted and hijacked packages injecting zero-width Unicode instructions into CLAUDE.md and .cursorrules"
      - phase: "Phase 2 (June 3-5, 2026)"
        target: "73 Microsoft Azure GitHub repositories disabled"
        method: "Worm self-propagates to repos where compromised packages were used; modifies CLAUDE.md via GitHub Actions"
    technique: "First confirmed self-replicating supply chain worm targeting AI coding agent configuration files. Injects hidden instructions using zero-width Unicode characters (U+200B, U+200C, U+FEFF) into CLAUDE.md and .cursorrules files — invisible to human code reviewers but executed by AI agents on next session load. Captures SSH keys, AWS credentials, GitHub tokens, and cryptocurrency keystores then exfiltrates to TeamPCP C2 infrastructure (83.142.209.0/24, Megalodon C2 at 216.126.225.129:8443)."
    c2:
      - "83.142.209.194 (TeamPCP primary C2)"
      - "83.142.209.11 (TeamPCP secondary C2)"
      - "83.142.209.203 (TeamPCP tertiary C2)"
      - "216.126.225.129:8443 (Megalodon C2)"
      - "git-service.com (C2 domain, registered 2026-05-16)"
    exfiltration:
      - "SSH private keys (~/.ssh/)"
      - "AWS credentials (~/.aws/credentials)"
      - "GitHub personal access tokens"
      - "Cryptocurrency wallet keystores"
    iocs:
      - "git-service.com (TeamPCP C2, registered 2026-05-16)"
      - "83.142.209.0/24 (TeamPCP C2 subnet)"
    attribution:
      group: "TeamPCP"
      linked_campaigns: ["TanStack npm Compromise (2025)", "Mistral AI npm Supply Chain", "@antv Typosquatting", "PyTorch Lightning", "Bitwarden CLI", "Intercom MCP"]
      tactics: "TeamPCP reuses 83.142.209.0/24 C2 infrastructure across all campaigns since 2025"
    notes: "Miasma is the first documented worm capable of propagating across organizations via shared npm dependencies. The combination of zero-width Unicode injection and AI agent auto-execution of config files creates a class of attacks with no prior analog in traditional supply chain security. Defenders must audit CLAUDE.md, AGENTS.md, and .cursorrules for invisible Unicode characters using tools like: `cat -A .claude/CLAUDE.md | grep -P '\\x00-\\x08|\\x0b|\\x0c|\\x0e-\\x1f|\\x80-\\x9f'`"
    sources:
      - "https://www.stepsecurity.io/blog/miasma-worm-hits-microsoft-github-repositories"
      - "https://thehackernews.com/2026/06/miasma-worm-hits-73-microsoft-github.html"

